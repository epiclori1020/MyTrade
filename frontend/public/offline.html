<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a2744" />
    <title>MyTrade — Offline</title>
    <style>
      /* ── Reset ─────────────────────────────────────────────────── */
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      /* ── Design tokens ─────────────────────────────────────────── */
      :root {
        --navy:        #1a2744;
        --navy-light:  #243259;
        --navy-card:   #1e2e52;
        --gold:        #d4a017;
        --gold-muted:  rgba(212, 160, 23, 0.18);
        --text-primary:   #e8ecf4;
        --text-secondary: #8fa3c0;
        --border:      rgba(212, 160, 23, 0.15);
        --font: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
                Helvetica, Arial, sans-serif;
      }

      /* ── Light mode overrides ──────────────────────────────────── */
      @media (prefers-color-scheme: light) {
        :root {
          --navy:        #f4f6fb;
          --navy-light:  #eaeff7;
          --navy-card:   #ffffff;
          --gold:        #b8880e;
          --gold-muted:  rgba(184, 136, 14, 0.10);
          --text-primary:   #1a2744;
          --text-secondary: #4a6080;
          --border:      rgba(184, 136, 14, 0.20);
        }
      }

      /* ── Base ──────────────────────────────────────────────────── */
      html, body {
        height: 100%;
      }

      body {
        background-color: var(--navy);
        color: var(--text-primary);
        font-family: var(--font);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* ── Layout ────────────────────────────────────────────────── */
      .wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 32px;
        max-width: 400px;
        width: 100%;
        text-align: center;
      }

      /* ── Logo mark ─────────────────────────────────────────────── */
      .logo-mark {
        width: 80px;
        height: 80px;
        background-color: var(--navy-card);
        border: 1.5px solid var(--border);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.18),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
      }

      .logo-text {
        font-size: 28px;
        font-weight: 700;
        color: var(--gold);
        letter-spacing: -0.5px;
        line-height: 1;
        /*
          Use pure CSS so no external font is needed.
          The weight+spacing combo reads as a proper logotype
          across system-ui implementations.
        */
      }

      /* ── Status icon ───────────────────────────────────────────── */
      .status-icon {
        width: 48px;
        height: 48px;
        background-color: var(--gold-muted);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1.5px solid var(--border);
      }

      /* SVG cloud-off icon — drawn inline, no external resources */
      .status-icon svg {
        width: 24px;
        height: 24px;
        stroke: var(--gold);
        stroke-width: 1.75;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }

      /* ── Card ──────────────────────────────────────────────────── */
      .card {
        background-color: var(--navy-card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 32px 28px;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        box-shadow:
          0 4px 24px rgba(0, 0, 0, 0.12),
          0 1px 4px rgba(0, 0, 0, 0.08);
      }

      /* ── Typography ────────────────────────────────────────────── */
      .heading {
        font-size: 22px;
        font-weight: 600;
        color: var(--text-primary);
        letter-spacing: -0.3px;
        line-height: 1.25;
      }

      .body-text {
        font-size: 15px;
        font-weight: 400;
        color: var(--text-secondary);
        line-height: 1.6;
        max-width: 300px;
      }

      /* ── Divider ───────────────────────────────────────────────── */
      .divider {
        width: 100%;
        height: 1px;
        background-color: var(--border);
      }

      /* ── Retry button ──────────────────────────────────────────── */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-height: 44px;
        padding: 10px 20px;
        background-color: var(--gold);
        color: #1a2744;
        font-family: var(--font);
        font-size: 14px;
        font-weight: 600;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: opacity 0.15s ease;
        text-decoration: none;
        -webkit-appearance: none;
      }

      .btn:hover {
        opacity: 0.88;
      }

      .btn:active {
        opacity: 0.75;
        transform: scale(0.98);
      }

      .btn svg {
        width: 15px;
        height: 15px;
        stroke: #1a2744;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
        flex-shrink: 0;
      }

      /* ── Footer note ───────────────────────────────────────────── */
      .footnote {
        font-size: 12px;
        color: var(--text-secondary);
        opacity: 0.65;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">

      <!-- Logo -->
      <div class="logo-mark">
        <span class="logo-text">MT</span>
      </div>

      <!-- Card -->
      <div class="card">

        <!-- Cloud-off status icon (inline SVG, no external resources) -->
        <div class="status-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <!-- Cloud with an X / no-signal shape -->
            <path d="M3 3l18 18" />
            <path d="M10 10.562A5 5 0 0 0 9 20h8.5a4.5 4.5 0 0 0 1.421-8.763" />
            <path d="M16.95 6.05A7 7 0 0 0 5.418 10.9" />
          </svg>
        </div>

        <h1 class="heading">Du bist offline</h1>

        <p class="body-text">
          Bitte verbinde dich mit dem Internet und versuche es erneut.
        </p>

        <div class="divider"></div>

        <!-- Retry — reloads the page; works without JS because it's a link -->
        <a
          href="/"
          class="btn"
          onclick="event.preventDefault(); window.location.reload();"
        >
          <!-- Refresh icon -->
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <polyline points="23 4 23 10 17 10" />
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
          </svg>
          Erneut versuchen
        </a>

      </div>

      <!-- Subtle footer -->
      <p class="footnote">MyTrade &mdash; Decision Support, nicht Anlageberatung</p>

    </div>
  </body>
</html>
